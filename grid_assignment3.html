<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .maincontainer{
            display:grid;
            background-color: aqua;
            gap:10px;
            grid-template-areas: 'n1 n1 n1 n1'
                                  'lftside mn mn mn'
                                  'lftside c1 c2 c3'
                                  'f1 f1 f1 f1';
        }
        .navbar1{
            background-color: green;
            height:150px;
            grid-area: n1;
        }
        .leftsidebar{
            background-color: yellow;
            height:600px;
            grid-area: lftside;
        }
        .main{
            background-color: red;
            height:300px;
            grid-area: mn;

        }
        .content1{
            background-color: rgb(161, 161, 189);
            height:300px;
            grid-area: c1;
        }
        .content2{
            background-color: rgb(255, 0, 170);
            height:300px;
            grid-area: c2;
        }
        .content3{
            background-color: rgb(27, 29, 31);
            height:300px;
            grid-area: c3;
        }
        .footer1{
            background-color: orange;
            height:200px;
            grid-area: f1;
        }

        @media screen and ((min-width:301px) and (max-width : 650px)) {
           .maincontainer{
            display: flex;
            flex-direction: column;
           }

        }

    </style>
</head>
<body>
    <div class="maincontainer">
        <div class="navbar1">NAVBAR</div>
        <div class="leftsidebar">LEFT SIDEBAR</div>
        <div class="main"> MAIN</div>
        <div class="content1"> CONTENT1</div>
        <div class="content2"> CONTENT2</div>
        <div class="content3"> CONTENT3 </div>
        <div class="footer1"> FOOTER </div>
    </div>
</body>
</html>
